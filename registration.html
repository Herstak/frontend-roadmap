<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма регистрации</title>
  </head>
  <body>
    <main id="registration">
      <form class="form form__group" action="/register" method="POST">
        <!-- Personal Data Section -->
        <fieldset class="form__group">
          <legend>Личные данные</legend>
          <label class="form__label" for="name">Имя:</label>
          <input
            class="form__input"
            type="text"
            name="name"
            id="name"
            minlength="2"
            maxlength="50"
            placeholder="Mickey"
            autofocus
            autocomplete="given-name"
            required
          />

          <label class="form__label" for="surname">Фамилия:</label>
          <input
            class="form__input"
            type="text"
            name="surname"
            id="surname"
            placeholder="Mouse"
            autocomplete="family-name"
            required
          />

          <label class="form__label" for="birthdate">Дата рождения:</label>
          <input
            class="form__input"
            type="date"
            name="birthdate"
            id="birthdate"
            required
          />

          <fieldset class="form__group">
            <legend>Пол:</legend>
            <label class="form__label"
              ><input
                class="form__input"
                type="radio"
                name="gender"
                value="other"
                required
              />Не указан</label
            >
            <label class="form__label"
              ><input
                class="form__input"
                type="radio"
                name="gender"
                value="male"
                required
              />Мужской</label
            >
            <label class="form__label"
              ><input
                class="form__input"
                type="radio"
                name="gender"
                value="female"
                required
              />Женский</label
            >
          </fieldset>

          <label class="form__label" for="country">Страна:</label>
          <select name="country" id="country" required>
            <option value="">Выбери страну</option>
            <option value="kz">Казахстан</option>
            <option value="ru">Россия</option>
            <option value="gb">Англия</option>
            <option value="tr">Турция</option>
            <option value="ge">Грузия</option>
          </select>
        </fieldset>

        <!-- Account Section -->
        <fieldset class="form__group">
          <legend>Учетная запись</legend>

          <label class="form__label" for="email">Эл. почта:</label>
          <input
            class="form__input"
            type="email"
            name="email"
            id="email"
            placeholder="example@domain.com"
            autocomplete="email"
            required
          />

          <label class="form__label" for="password">Пароль:</label>
          <input
            class="form__input"
            type="password"
            name="password"
            id="password"
            minlength="8"
            required
          />

          <label class="form__label" for="password-confirm"
            >Повторите пароль:</label
          >
          <input
            class="form__input"
            type="password"
            name="password-confirm"
            id="password-confirm"
            minlength="8"
            required
          />

          <label class="form__label" for="avatar">Аватар:</label>
          <input
            class="form__input"
            type="file"
            name="avatar"
            id="avatar"
            accept="image/*"
          />

          <label class="form__label" for="aboutme">О себе:</label>
          <textarea
            name="aboutme"
            id="aboutme"
            maxlength="500"
            placeholder="Расскажи о себе:"
          ></textarea>

          <!-- About me Section -->
          <fieldset class="form__group">
            <legend>Хобби:</legend>
            <label class="form__label"
              ><input
                class="form__input"
                type="checkbox"
                name="hobbies"
                value="coding"
              />Программирование</label
            >
            <label class="form__label"
              ><input
                class="form__input"
                type="checkbox"
                name="hobbies"
                value="sport"
              />Спорт</label
            >
            <label class="form__label"
              ><input
                class="form__input"
                type="checkbox"
                name="hobbies"
                value="reading"
              />Книги</label
            >
            <label class="form__label"
              ><input
                class="form__input"
                type="checkbox"
                name="hobbies"
                value="movies"
              />Фильмы</label
            >
          </fieldset>

          <label class="form__label" for="policy"
            ><input
              class="form__input"
              type="checkbox"
              name="policy"
              id="policy"
              required
            />Я согласен с условиями политики</label
          >

          <label class="form__label" for="mailing"
            ><input
              class="form__input"
              type="checkbox"
              name="mailing"
              id="mailing"
            />Подписаться на рассылку новостей</label
          >
        </fieldset>

        <button class="form__button" type="submit">Отправить</button>
        <button class="form__button" type="reset">Очистить</button>
      </form>
    </main>
  </body>
</html>
